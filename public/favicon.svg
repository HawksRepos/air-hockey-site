<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Simplified air-cushion icon: a block hovering above a strip with airflow arrows -->
  <!-- Strip base -->
  <rect x="2" y="22" width="28" height="4" rx="1.5" fill="#2B6CB0"/>
  <!-- Air gap (dashed line suggesting flow) -->
  <line x1="6" y1="20" x2="26" y2="20" stroke="#34D399" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.7"/>
  <!-- Floating block -->
  <rect x="7" y="10" width="18" height="8" rx="2" fill="#A78BFA"/>
  <!-- Upward arrows (lift) -->
  <path d="M12 26 L12 23" stroke="#34D399" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M16 26 L16 23" stroke="#34D399" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M20 26 L20 23" stroke="#34D399" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Tiny hole dots on the strip -->
  <circle cx="10" cy="24" r="0.8" fill="#0F1419"/>
  <circle cx="14" cy="24" r="0.8" fill="#0F1419"/>
  <circle cx="18" cy="24" r="0.8" fill="#0F1419"/>
  <circle cx="22" cy="24" r="0.8" fill="#0F1419"/>
</svg>
