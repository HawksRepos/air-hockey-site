<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Air-Cushioned Carriage — Design Tool</title>
    <meta name="description" content="Interactive design tool for air-cushioned floating carriage systems — hole sizing, fan matching, hover height prediction, and energy analysis. Built for a university engineering project." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Lexend', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

      /* Print path — produce a clean one-page(ish) design specification
         when the reader chooses File → Print (or Save as PDF). Hides
         interactive chrome and flattens the dark theme to something
         that prints legibly on white paper. */
      @media print {
        html, body, #root { background: #fff !important; color: #000 !important; }
        body { font-size: 10.5pt; }
        a { color: #000 !important; text-decoration: underline; }
        svg, img { page-break-inside: avoid; break-inside: avoid; }
        section, .card, [role="region"] { page-break-inside: avoid; break-inside: avoid; }
        [data-print="hide"] { display: none !important; }
        button, input[type="range"] { display: none !important; }
        * { box-shadow: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
