name: Check

on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npx prettier --check "src/**/*.{js,jsx,css}"
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-snapshot-diff
          path: |
            src/physics/__tests__/__snapshots__/
            vitest-report.json
          if-no-files-found: ignore
